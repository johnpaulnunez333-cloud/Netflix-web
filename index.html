<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <style> Netflix </style>
        <link rel="stylesheet" href="style.css">
        
        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    </head>
    <body>
        
        <div class="login-wrappper">
            <div class="login-card" id="loginCard">
                <h1>Sign In</h1>
                <div id="react-root">
                    <form id="loginForm">
                       <input type="email" id="email" class="form-input" placeholder="Email or phone number">
                       <input type="password" id="password" class="form-input" placeholder="Password">
                       <button type="submit" id="submitBtn" class="signin-Btn">Sign in</button>
                       
                       <div class="form-help">
                           <div class="remember-me">
                               <input type="checkbox" id="rem" checked>
                               <label for="rem">Remember me</label>
                           </div>
                           <a href="#" class="help-link">Need help?</a>
                       </div>
                    </form>
                </div>
                
                <div class="login-footer">
                    <div class="fb-login">
                        <img src="facebook.jpg" alt="fb">
                        <span>Login with Facebook</span>
                    </div>
                    <p class="signup-text"> New to Netflix? <a href="#"> Sign up now</a></p>
                </div>
            </div>
        </div>
        
        <script type="text/babel" src="app.jsx"></script>
        <script src="script.js"></script>
    </body>
</html>
